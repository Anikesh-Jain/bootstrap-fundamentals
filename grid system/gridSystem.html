<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      #blue{
        background-color: blue;
        height: 400px;
      }
      #row{
        background-color: rgb(0, 217, 255);
        height: 100px;
      }
    </style>
  </head>
  <body>
    <!-- bootstrap flow 
    container > row > column > content(text and image) -->
    <!-- if defined the breaktrough at any point then its upper size level will allow the same design but below size level will share col-12 for every column-->
    <div class="container-fluid" id="blue">
      <div class="row" id="row">
        <div class="col-xl-8 col-lg-4 col-md-4 col-sm-6 col-12 bg-primary text-white">col-4</div>
        <div class="col-xl-6 col-lg-6 col-md-4 col-sm-6 col-12 bg-secondary text-white">col-8</div>
        <div class="col-xl-4 col-lg-4 col-md-4 col-sm-12 col-12 bg-success text-white">col-8</div>
      </div>
    </div>  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

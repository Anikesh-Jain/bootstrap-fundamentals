<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      #blue{
        background-color: blue;
        height: 400px;
      }
      #row{
        background-color: rgb(0, 217, 255);
        height: 100px;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid" id="blue">
      <div class="row" id="row">
        <div class="col-lg-4 bg-primary text-white">col-4</div>
        <div class="col-lg-8 bg-secondary text-white">col-8
          <div class="row">
            <div class="col-4 bg-warning text-white">div-1</div>
            <div class="col-4 bg-danger text-white">div-2</div>
            <div class="col-4 bg-info text-white">div-3</div>
        </div>
      </div>
    </div>  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

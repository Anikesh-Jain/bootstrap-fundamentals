<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      #blue{
        background-color: blue;
        height: 400px;
      }
      #row{
        background-color: rgb(0, 217, 255);
        height: 100px;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid" id="blue">
      <div class="row" style="min-height: 400px;">
        <!--Shortcur-1 dont define the value so that div will divide into equal parts in any device
            Shortcut-2 define value of one  div u want change other will divide the space equally
            Shortcut-3 if u want that column take that much require for the text just use auto after column
            Shortcut-4 if u want to to make two column in a row like this then change add ro-cols-no. after row class-->
        <div class="col bg-primary">div1</div>
        <div class="col bg-secondary">div2</div>
        <div class="col bg-success">div3</div>
        <div class="col bg-danger">div4</div>
      </div>
    </div>  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
